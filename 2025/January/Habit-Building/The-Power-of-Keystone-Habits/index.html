    <!-- JavaScript to Generate and Inject the Article Content -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Article Data Object
            const articleData = {
                category: 'Habit Building',
                title: 'The Power of Keystone Habits',
                description: 'Discover how focusing on one key habit can transform multiple areas of your life.',
                author: 'Jane Doe',
                date: 'March 14, 2024',
                readTime: '5 min read',
                imageUrl: 'https://images.pexels.com/photos/4964985/pexels-photo-4964985.jpeg?auto=compress&cs=tinysrgb&w=600&h=400&dpr=1',

            };

            // 2. Function to generate the article's HTML
            function generateArticleHtml(article) {
                // Placeholder content for the article body
                const articleBody = `
                    <p>In the world of self-improvement, we often think that massive change requires massive action. We set out to transform our lives overnight, only to find ourselves overwhelmed and back where we started. But what if the secret to widespread change lies not in doing everything at once, but in focusing on just one or two critical habits? This is the power of <strong>keystone habits</strong>.</p>
                    
                    <p>Coined by Charles Duhigg in his bestselling book, "The Power of Habit," a keystone habit is a single practice that sparks a chain reaction, creating a cascade of other positive habits and improvements in its wake. They are the small wins that lead to bigger victories.</p>
                    
                    <h2>What Makes a Habit a "Keystone"?</h2>
                    <p>Not all habits are created equal. A keystone habit has a unique ripple effect. Think of exercise. When you start exercising regularly, you might naturally begin to eat better to fuel your workouts. You might sleep more soundly because you're physically tired. Your stress levels might decrease, leading to improved focus at work and more patience with your family. Exercise didn't directly cause these changes, but it created the environment for them to flourish.</p>
                    
                    <p>Common examples of keystone habits include:</p>
                    <ul>
                        <li><strong>Regular Exercise:</strong> Boosts energy, improves mood, and encourages healthier eating.</li>
                        <li><strong>Making Your Bed Every Morning:</strong> Instills a sense of order and accomplishment, setting a productive tone for the day.</li>
                        <li><strong>Tracking Your Food Intake:</strong> Raises awareness about your diet, often leading to healthier choices without a strict "diet plan."</li>
                        <li><strong>Daily Meditation or Mindfulness:</strong> Reduces stress and increases emotional regulation, impacting how you react to challenges.</li>
                    </ul>
                    
                    <blockquote>"Keystone habits say that success doesn’t depend on getting every single thing right, but instead relies on identifying a few key priorities and fashioning them into powerful levers." — Charles Duhigg</blockquote>
                    
                    <h2>How to Find Your Own Keystone Habit</h2>
                    <p>Identifying a potential keystone habit is a personal journey. Start by looking for areas of your life that create a sense of "small wins." Ask yourself: which single change could create the most positive momentum? It doesn't have to be the biggest or hardest habit. In fact, it's often better to start small.</p>
                    <p>Focus on one area—be it physical health, morning routine, or financial tracking. Commit to one small, consistent action. By nurturing that one keystone, you're not just building a single habit; you're planting a seed for comprehensive personal evolution.</p>
                `;

                // Combine all parts into the final HTML structure
                return `
                    <section class="page-section">
                        <div class="container">
                            <div class="article-detail-header">
                                <span class="article-category">${article.category}</span>
                                <h1>${article.title}</h1>
