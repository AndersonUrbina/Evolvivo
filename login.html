<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOGIN</title>
  <link rel="icon" type="image/x-icon" href="https://img.icons8.com/ios-filled/50/4CAF50/leaf.png">
  <link rel="stylesheet" href="Resources/style.css">
  <script type="text/javascript" src="validation.js" defer></script>
  <style>
    /* Style for the back arrow and its hover effect */
    .back-arrow {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 45px; /* Sizing the circular area */
      height: 45px;
      border-radius: 50%; /* This makes the background a circle */
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s ease; /* Smooth transition for the hover effect */
    }
    
    .back-arrow:hover {
      background-color: rgba(0, 0, 0, 0.1); /* A semi-transparent black to 'darken' the area */
    }

    .back-arrow img {
      width: 28px; /* Adjust image size to fit well within the circle */
      height: auto;
    }
  </style>
</head>
<body>
  <!-- Back Arrow -->
  <a href="https://evolvivo.com/" class="back-arrow">
    <img src="https://raw.githubusercontent.com/AndersonUrbina/Evolvivo/93c354d4153bf52910eab52b4ead9022ecd48898/Resources/Arrow-back.svg" alt="Back">
  </a>

  <div class="wrapper">
    <h1>Login</h1>
    <p id="error-message"></p>
    <form id="form">
      <div>
        <label for="email-input">
          <span>@</span>
        </label>
        <input type="email" name="email" id="email-input" placeholder="Email" required>
      </div>
      <div>
        <label for="password-input">
          <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"><path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm240-200q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80Z"/></svg>
        </label>
        <input type="password" name="password" id="password-input" placeholder="Password" minlength="8" maxlength="14" required>
      </div>
      <button type="submit">Login</button>
    </form>
    <p>New here? <a href="./signup">Create an Account</a></p>
  </div>
</body>
</html>
