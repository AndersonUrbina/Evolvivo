<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNUP</title>
    <link rel="icon" type="image/x-icon" href="https://img.icons8.com/ios-filled/50/4CAF50/leaf.png">
    <link rel="stylesheet" href="Resources/style.css">
    <!-- SCRIPT DE GOOGLE -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      /* Estilos para el botón de Google y el divisor */
      .google-signin-container {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .divider {
        margin: 15px 0;
        width: 100%;
        text-align: center;
        border-bottom: 1px solid #ccc;
        line-height: 0.1em;
      }
      .divider span {
        background: #fff;
        padding: 0 10px;
        color: #777;
      }
      /* Estilos para la flecha de volver (ya los tenías) */
      .back-arrow {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.3s ease;
      }
      .back-arrow:hover {
        background-color: rgba(0, 0, 0, 0.1);
      }
      .back-arrow img {
        width: 28px;
        height: auto;
      }
    </style>
</head>
<body>
<!-- Back Arrow -->
<a href="https://evolvivo.com/" class="back-arrow">
  <img src="https://raw.githubusercontent.com/AndersonUrbina/Evolvivo/93c354d4153bf52910eab52b4ead9022ecd48898/Resources/Arrow-back.svg" alt="Back">
</a>

<!-- Sign Up Page -->
    <div class="wrapper" id="signup-wrapper">
        <div class="page-header">
            <h1>SignUp</h1>
        <form id="form">
            <!-- Tus inputs de signup -->
            <div>
            <label for="firstname-input"><svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"><path d="M480-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Z"/></svg>
            </label>
                <input type="text" name="firstname" id="firstname-input" placeholder="Firstname" required/>
            </div>
            <div>
            <label for="email-input"><span>@</span>
            </label>
                <input type="email" name="email" id="email-input" placeholder="Email" required/>
            </div>
            <div>
            <label for="password-input"><svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"><path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm240-200q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80Z"/></svg>
            </label>
                <input type="password" name="password" id="password-input" placeholder="Password" minlength="8" maxlength="14" required/>
            </div>
            <div>
            <label for="repeat-password-input"><svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"><path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm240-200q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80Z"/></svg>
            </label>
                <input type="password" name="repeat-password" id="repeat-password-input" placeholder="Repeat Password" minlength="8" maxlength="14" required/>
            </div>
            <button type="submit">SignUp</button>
        </form>

        <!-- DIVISOR Y BOTÓN DE GOOGLE -->
        <div class="divider"><span>OR</span></div>
        <div class="google-signin-container">
          <div id="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signup_with"
             data-size="large"
             data-logo_alignment="left">
        </div>
        <br>
        </div>
        <p>Already have an Account? <a href="./login">Login</a></p>
        </div>
    </div>
    
    <!-- Script principal, ahora separado para la autenticación -->
    <script src="auth.js" defer></script>
</body>
</html>
